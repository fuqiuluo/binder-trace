name: DDK kernel module build

on:
  workflow_call:
    inputs:
      kmi:
        description: "KMI version"
        required: true
        type: string
      ddk_release:
        description: "DDK release version"
        required: false
        default: "20251016"
        type: string
      module_name:
        description: "Kernel module name without the .ko suffix"
        required: false
        default: "bt-kmod"
        type: string
      module_dir:
        description: "Directory that contains the module Makefile"
        required: false
        default: "kernel"
        type: string

jobs:
  build-module:
    name: Build ${{ inputs.module_name }}.ko for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build ${{ inputs.module_name }}.ko
        working-directory: ${{ inputs.module_dir }}
        run: |
          echo "=== Build ${{ inputs.module_name }}.ko for KMI ${{ inputs.kmi }} ==="

          make KDIR=$KERNEL_SRC

          echo "=== Build finished ==="

          mkdir -p /github/workspace/out

          OUTPUT_NAME="${{ inputs.module_name }}-${{ inputs.kmi }}.ko"
          cp "${{ inputs.module_name }}.ko" "/github/workspace/out/$OUTPUT_NAME"

          echo "Copied to: /github/workspace/out/$OUTPUT_NAME"
          ls -la "/github/workspace/out/$OUTPUT_NAME"
          echo "Size: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"
          llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
          echo "Stripped size: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"

      - name: Upload ${{ inputs.module_name }}.ko artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.module_name }}-${{ inputs.kmi }}.ko
          path: /github/workspace/out/${{ inputs.module_name }}-${{ inputs.kmi }}.ko
