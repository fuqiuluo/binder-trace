name: Release binder-trace

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  ANDROID_API: "23"
  ANDROID_NDK_VERSION: "27.1.12297006"

jobs:
  build-android:
    name: Build Android ${{ matrix.target }} binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            clang_prefix: aarch64-linux-android
            linker_env: CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER
            asset: binder-trace-aarch64-linux-android
          - target: x86_64-linux-android
            clang_prefix: x86_64-linux-android
            linker_env: CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER
            asset: binder-trace-x86_64-linux-android

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-
            ${{ runner.os }}-cargo-release-

      - name: Install Android NDK
        run: |
          set -euo pipefail

          android_home="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$android_home" ]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT is required" >&2
            exit 2
          fi

          sdkmanager_bin="$android_home/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager_bin" ]; then
            sdkmanager_bin="$(command -v sdkmanager || true)"
          fi
          if [ -z "$sdkmanager_bin" ]; then
            echo "sdkmanager is required" >&2
            exit 2
          fi

          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" "ndk;${ANDROID_NDK_VERSION}"

          ndk_home="$android_home/ndk/${ANDROID_NDK_VERSION}"
          test -d "$ndk_home"
          echo "ANDROID_NDK_HOME=$ndk_home" >> "$GITHUB_ENV"

      - name: Build release binary
        run: |
          set -euo pipefail

          cargo_retry() {
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              sleep $((attempt * 20))
            done
            "$@"
          }

          linker="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.clang_prefix }}${ANDROID_API}-clang"
          test -x "$linker"
          export "${{ matrix.linker_env }}=$linker"

          cargo_retry cargo fetch --locked --target "${{ matrix.target }}"
          cargo_retry cargo build --locked --release -p bt-cli --bin binder-trace --target "${{ matrix.target }}"

          output="target/${{ matrix.target }}/release/binder-trace"
          test -x "$output"
          file "$output"
          mkdir -p out
          install -m 755 "$output" "out/${{ matrix.asset }}"

      - name: Upload ${{ matrix.asset }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

  build-modules:
    name: Build bt-kmod.ko for ${{ matrix.kmi }}
    uses: ./.github/workflows/ddk-lkm.yml
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: "20251016"
      module_name: "bt-kmod"
      module_dir: "kernel"
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-modules
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --title "$TAG_NAME" --generate-notes
          fi
