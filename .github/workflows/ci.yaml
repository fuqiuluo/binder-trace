name: 构建 binder-trace 内核模块

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - ".github/workflows/**"
      - "kernel/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "kernel/**"

jobs:
  build-modules:
    name: 为 ${{ matrix.kmi }} 构建 bt-kmod.ko
    uses: ./.github/workflows/ddk-lkm.yml
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: "20251016"
      module_name: "bt-kmod"
      module_dir: "kernel"
